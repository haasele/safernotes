name: safenotes
description: Encrypted, private note manager
homepage: https://safenotes.dev/
documentation: https://safenotes.dev/
publish_to: 'none'

version: 2.3.0+10

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: 3.41.6

dependencies:
  flutter:
    sdk: flutter

  after_layout: ^1.2.0
  appflowy_editor: ^6.2.0
  any_link_preview: ^3.0.2
  audioplayers: ^6.1.0
  auto_size_text: ^3.0.0
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  device_info_plus: any
  dynamic_color: ^1.7.0
  easy_localization: ^3.0.8
  encrypt: ^5.0.3
  file_picker: ^10.0.0
  flutter_highlight: ^0.7.0
  flutter_secure_storage: ^10.0.0
  flutter_staggered_grid_view: ^0.7.0
  highlight: ^0.7.0
  image_picker: ^1.1.2
  intl: any
  local_auth: ^3.0.0
  local_session_timeout: ^3.2.0
  logger: ^2.4.0
  material_design_icons_flutter: ^7.0.7296
  media_scanner: ^2.1.0
  modal_bottom_sheet: ^3.0.0
  page_transition: ^2.1.0
  path: ^1.9.0
  path_provider: ^2.1.5
  perfect_freehand: ^2.0.0
  permission_handler: ^12.0.0
  provider: ^6.1.5
  record: ^6.2.0
  settings_ui: ^2.0.2
  shared_preferences: ^2.3.2
  sqflite: ^2.4.0
  timeago: ^3.6.1
  tuple: ^2.0.2
  url_launcher: ^6.3.0
  uuid: ^4.5.1

  safenotes_nord_theme:
    git:
      url: https://github.com/keshav-space/safenotes-nord-theme.git
      ref: main
    

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.1
  import_sorter: ^4.6.0
  rename: ^3.0.2
  dependency_validator: ^5.0.5
  flutter_lints: ^6.0.0
  

flutter_native_splash:
  color: "#ECEFF4"
  image: assets/images/splash_500.png
  color_dark: "#2E3440"
  image_dark: assets/images/splash_500.png

  android_12:
    color: "#ECEFF4"
    icon_background_color: "#ECEFF4"
    image: assets/images/splash_12.png
    color_dark: "#2E3440"
    icon_background_color_dark: "#2E3440"
    image_dark: assets/images/splash_12.png

  fullscreen: true



flutter_launcher_icons:
  android: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 25
  ios: true
  remove_alpha_ios: true
  image_path_ios: "assets/images/icon_no_alpha_ios.png"

  

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with app, so that app can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/translations/

  fonts:
    - family: NotoMonochromaticEmoji
      fonts:
        - asset: assets/fonts/NotoEmoji-VariableFont_wght.ttf
